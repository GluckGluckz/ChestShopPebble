    buyX-title: "&aBuy %amount%x"
    buyX-lore:
      - "&7Cost &a%currency%%price%"
      - "&8Purchase from this market stall."
    adminview: "&c&lAdmin View"
    storage: "&e&lStorage"
    settings: "&b&lSettings"
    disabledButtonTitle: "&cDisabled"
    disabledButtonLore:
      - "&7This option is disabled by"
      - "&7the shop owner."
transactions:
  transactionButtonTitle: "&bTransaction Logs"
  backToSettingsButton: "&eBack to Settings"
