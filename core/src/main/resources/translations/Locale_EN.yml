  minutesago: "&e%minutes% minute(s) ago"
  hoursago: "&e%hours% hour(s) ago"
  daysago: "&e%days% days ago"
  player-inform-buy: "&3PebbleShop &8» &b%player% &7bought &e%amount%x &d%item% &7for &a%currency%%price%"
  player-inform-sell: "&3PebbleShop &8» &b%player% &7sold &e%amount%x &d%item% &7for &a%currency%%price%"
settings:
  GuiTitle: "&3&lPebbleShop Settings"
  statusOn: "&aOn"
  statusOff: "&cOff"
  buttons:
    toggleTransactions:
      Title: "&eTransaction Alerts"
      Lore:
        - "&7Current status: %status%"
        - "&7Receive a chat message when"
        - "&7players buy or sell here."
    disableBuying:
      Title: "&eDisable Buying"
      Lore:
        - "&7Current status: %status%"
        - "&7If enabled, players cannot buy"
        - "&7from your PebbleShop."
    disableSelling:
      Title: "&eDisable Selling"
      Lore:
        - "&7Current status: %status%"
        - "&7If enabled, players cannot sell"
        - "&7items to your PebbleShop."
    shopAdmins:
      Title: "&eShop Helpers"
      nobodyStatusAdmins: "&aNobody"
      Lore:
        - "&7Add or remove trusted helpers."
        - "&7Helpers can access storage and"
        - "&7some settings, but not owner"
        - "&7controls or helper management."
        - "&aLeft Click &7to add a helper"
        - "&cRight Click &7to remove a helper"
        - "&7Current helpers: %admins%"
    sharedIncome:
      Title: "&eShared Income"
      Lore:
        - "&7Current status: %status%"
        - "&7If enabled, sale profits are"
        - "&7shared with shop helpers."
    hologramRotation:
      Title: "&eHologram Rotation"
      Lore:
        - "&7Rotation:"
        - "%rotations%"
        - "&aLeft&7/&cRight&7-click to cycle"
        - "&7through all rotations."
    changePrices:
      Title: "&eBuy/Sell Prices"
      Lore:
        - "&7Edit your market stall prices."
        - "&d"
        - "&cLeft click &7to edit Sell"
        - "&aRight click &7to edit Buy"
      SignPlaceholderBuy:
        - ""
        - "&a^^ &7Enter &a^^"
        - "&7your new"
        - "&abuy &7price!"
      SignPlaceholderSell:
        - ""
        - "&c^^ &7Enter &c^^"
        - "&7your new"
        - "&csell &7price!"
    hologramMessage:
      Title: "&eStall Hologram"
      Lore:
        - "&cLeft Click &7to add a custom"
        - "&chologram message."
        - "&aRight Click &7to manage your"
        - "&acurrent hologram messages."
        - "&d"
        - "&8You can use line %lineNumbers%."
        - "<ifhasmax>&8You can add %messagesleft% more line(s).</ifhasmax>"
      LoreMaxReached:
        - "&cYou can only have"
        - "&c%maxLines% lines."
        - "&7Click here to manage"
        - "&7your hologram messages."
      LoreEdit:
        - "&cLeft Click &7to edit your custom"
        - "&chologram message."
        - "&aRight Click &7to manage your"
        - "&acurrent hologram messages."
        - "&d"
        - "&8You can use line %lineNumbers%."
        - "<ifhasmax>&8You can add %messagesleft% more line(s).</ifhasmax>"
      SignPlaceholderTexts: "###############"
    other:
      backToShopGuiButton: "&eBack to Shop"
      latestTransactionsTitle: "&aLatest Sales"
  chat:
    toggleTransactions:
      MessageOn: "&3PebbleShop &8» &7Transaction alerts: &aON"
      MessageOff: "&3PebbleShop &8» &7Transaction alerts: &cOFF"
    disableBuying:
      MessageOn: "&3PebbleShop &8» &7Buying disabled: &aON"
      MessageOff: "&3PebbleShop &8» &7Buying disabled: &cOFF"
    disableSelling:
      MessageOn: "&3PebbleShop &8» &7Selling disabled: &aON"
      MessageOff: "&3PebbleShop &8» &7Selling disabled: &cOFF"
    shopAdmins:
      addingAdminWaiting: "&3PebbleShop &8» &7Type the player name to add as a shop helper."
      removingAdminWaiting: "&3PebbleShop &8» &7Type the player name to remove from shop helpers."
      selfAdmin: "&cYou cannot add or remove yourself as a helper."
      sucAdminAdded: "&e%player% &awas added as a shop helper."
      alreadyAdmin: "&cThat player is already a shop helper."
      noPlayer: "&cThat player does not exist or has not joined before."
      sucAdminRemoved: "&e%player% &awas removed from shop helpers."
      notInAdminList: "&cThat player is not a shop helper."
      clearedAdmins: "&cRemoved all helpers from this shop."
    sharedIncome:
      MessageOn: "&3PebbleShop &8» &7Shared income: &aON"
      MessageOff: "&3PebbleShop &8» &7Shared income: &cOFF"
    copy-paste:
      copiedShopSettings: "[&6Copied &7shop settings!](%settings%)"
      pastedShopSettings: "&3PebbleShop &8» &aPasted shop settings."
    hologramRotation:
      rotateHologramInChat: "&3PebbleShop &8» &7Hologram rotation: %rotation%"
      rotation:
        Up: "&aUp"
        North: "&aNorth"
        East: "&aEast"
        South: "&aSouth"
        West: "&aWest"
        Down: "&aDown"
    protection:
      cannotDestroyShop: "&cYou cannot destroy this PebbleShop."
customMessageManager:
  GuiTitle: "&3&lPebbleShop Holograms"
  ConfirmDeleteGuiTitle: "&c&lDelete Hologram Line?"
  buttons:
    previousPage:
      Title: "&ePrevious"
      Lore:
    nextPage:
      Title: "&eNext"
      Lore:
    shopEntry:
      Title: "&7%shopitem% &7stall"
      UnkownTitle: "&cUnknown stall"
      Lore:
        - "&7Located at &eX:%x%, Y:%y%, Z:%z%"
