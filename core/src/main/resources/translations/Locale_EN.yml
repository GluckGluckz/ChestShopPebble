  overflowing-gui-items-notification: "&3[&bPebbleShop&3] &eYou have overflowing items in your customized GUI. Make sure these items are in a large enough GUI: &c%overflow%"
  overlapping-gui-items-notification: "&3[&bPebbleShop&3] &eYou have overlapping items in your customized GUI. Unusual overlapping items: &c%overlap%"
  no-breaking-while-viewing: "&cYou cannot break a shop while someone is using it!"
