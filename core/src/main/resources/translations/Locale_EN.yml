  PaperTitleSell: "&cPurchase | %player%"
  PaperLoreBuy:
    - "&7Total: &a%price%"
    - "&7Quantity: &e%count%"
    - "&7Type: &aBought from you"
    - "&8%time%"
  PaperLoreSell:
    - "&7Total: &a%price%"
    - "&7Quantity: &e%count%"
    - "&7Type: &cSold to you"
    - "&8%time%"
