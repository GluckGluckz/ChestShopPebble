  - "&eShulkerbox Shop:"
  - "&7Owner: &6%owner%"
  - "&7Item: &6%item%"
  - "&7Buy: &6%currency%%buy_price%"
  - "&7Sell: &6%currency%%sell_price%"
hologram:
  shop-empty: "&cThis shop is empty!"
  shulkerbox-item: "&7%item% x&e%amount%"
  shulkerbox-item-more: "&7and &e%amount% &7more!"
  item-enchantment: "&b%enchantment% &e%level-roman%"
  item-enchantment-more: "&7and &e%amount% &7more!"
