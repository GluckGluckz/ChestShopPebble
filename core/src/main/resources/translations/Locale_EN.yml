        - "&eHologram messages:"
        - "&7%hologram-messages%"
        - ""
        - "&cLeft Click &7to delete this"
        - "&chologram message."
        - "&aRight Click &7to edit this"
        - "&ahologram message."
    confirmDelete:
      Title: "&cAre you sure?"
      Lore:
        - "&7You are about to delete"
        - "&7this hologram message."
        - "&7This action cannot be undone."
        - "&cClick to confirm."
    backToCustomMessageManager:
      Title: "&eBack to Hologram Messages"
      Lore:
    modifyCurrentHologram:
      Title: "&eModify current hologram"
      Lore:
        - "&cLeft Click &7to delete the current"
        - "&chologram message."
        - "&aRight Click &7to edit the current"
        - "&ahologram message."
