# PebbleShop plugin configuration
# Before editing this file, do not use TAB characters. Use spaces only.
# PebbleShop is the Pebble Quest player chest shop plugin.
language: Locale_EN
shops:
  hologram:
    # Holograms are shown asynchronously and are designed to be lightweight.
    show-holograms: true
    # Represents the holographic texts of chest shops. Use %item% to display the item's display name.
    # Use [item] for 1 line to display the floating item. Use %buy% for buy price and %sell% for sell price.
    # %currency% is defined under economy.server-currency and %owner% represents the shop creator.
    # %maxbuy% & %maxsell% can define the maximum amount a player can buy/sell from a shop at this time.
    # %stock% can display the amount of items stored in the shop.
    # %capacity% can display the maximum amount of items the shop can hold.
    # %maxStackSize% displays the max stack size of the shop item.
    # The HTML-like <buy></buy> syntax allows the plugin to remove parts of the message if buy/sell are disabled.
    holo-structure:
      - "<emptyShopInfo/>"
      - "<custom1/>"
      - "<custom2/>"
      - "<custom3/>"
      - "<custom4/>"
      - "<buy>&bBuy: &a%buy% %currency%</buy><separator> &8| </separator><sell>&bSell: &c%sell% %currency%</sell>"
      - "&d%item%"
      - "<itemdata1/>"
      - "<itemdata2/>"
      - "<itemdata3/>"
      - "<itemdata4/>"
      - "<itemdataRest/>"
      - "[item]"
    holo-structure-adminshop:
      - "<custom1/>"
      - "<custom2/>"
      - "<custom3/>"
      - "<custom4/>"
      - "<buy>&bBuy: &a%buy% %currency%</buy><separator> &8| </separator><sell>&bSell: &c%sell% %currency%</sell>"
      - "&d%item%"
      - "<itemdata1/>"
      - "<itemdata2/>"
      - "<itemdata3/>"
      - "<itemdata4/>"
      - "<itemdataRest/>"
      - "[item]"
    # Define a custom line spacing multiplier. 1 is default.
    holo-line-spacing: 1
    # Hologram will get removed after x seconds if the plugin doesn't detect movement toward a chest shop.
    hologram-disappearance-delay: 10
    # Allows players to rotate their holograms to be displayed on different sides of the block.
    allow-rotation: true
    # Alternative hologram display system, which is slower but provides easier visibility of nearby shops.
    distance:
      toggled: true
      # Defines the range at which shops will render holograms.
      range: 20.0
      # Set if items should be rendered first and holograms only when looking at the shop directly.
      show-items-first: true
  # Define which containers are applicable for chest shops:
  container:
    chests: true
    trapped-chests: true
    barrels: true
    shulkers: false
  display:
    # Define how the plugin should format displayed numbers. See DecimalFormat documentation.
    number-format:
      gui: "###,###.##"
      chat: "###,###.##"
      hologram: "###,###.##"
  settings:
    # Define the default settings when creating a shop:
    defaults:
      transaction-message: false
      disable-buying: false
      disable-selling: false
      rotation: "up"
      share-profit: true
    # If set to true, "/ecs create 12 0" will automatically disable selling, and "/ecs create 0 12" will disable buying.
    zero-price-equals-disabled: true
    # If set to true, this setting will require players to use a buy price that is greater than the sell price.
    buy-greater-than-sell: true
    # If set to true, shulker shops will be given lore when mined.
    add-shulkershop-lore: true
    # Toggle if custom amount buying or selling should be enabled.
    custom-amount-transactions: true
    hologram-messages:
      enabled: true
      # When true, custom hologram messages will be displayed even if hologram.distance.show-items-first is enabled.
      show-always: false
      # Sets how many lines can be used for custom hologram messages. If permissions.hologram-message-line-count is true, this setting is overridden.
      line-count-default: 1
      # If true, this will always show players if a shop is empty.
      show-empty-shop-always: true
  commands:
    enabled: false
    shop:
      buy:
        "*":
          - /tell %player_name% You bought an item!
          - /tell %player_name% Thanks for shopping!
      sell:
        "*":
          - /tell %player_name% You sold an item!
      open:
        - /tell %player_name% Opening shop!
    adminshop:
      buy:
        "*":
          - /tell %player_name% You bought an admin item!
      sell:
        "*":
          - /tell %player_name% You sold an admin item!
      open:
        - /tell %player_name% Opening adminshop!
economy:
  # Used to replace %currency% for the language files and holograms.
  server-currency: $
  use-xp: false
commands:
  # Keep these false unless you specifically want PebbleShop to claim /shop or /adminshop.
  # /pshop, /pebbleshop, /ecs, /cs, /cshop, /chestshop are registered in plugin.yml.
  alias:
    ecs-shop: false
    ecsadmin-adminshop: false
  checkprofit-lines-per-page: 4
permissions:
  # If set to true, players require the permission "ecs.shops.limit.X" where X is the maximum amount of shops a player can create.
  create-shops: false
  # Limit the amount of hologram messages a player can create. Use "ecs.shops.hologram.messages.limit.X"
  hologram-message-limit: false
  # Specify how many lines a player can use for their hologram messages. Use "ecs.shops.hologram.messages.lines.X"
  hologram-message-line-count: false
tasks:
  # Normally, this option is for when other plugins remove chest shops and PebbleShop needs to clean up stale data.
  # If this causes too much lag, you can turn this off. Requires restart.
  check-for-removed-shops: false
# Databases section
database:
  # Available types: SQLite & MySQL. MySQL is recommended for larger servers.
  type: SQLite
  # MySQL database information in case of usage
  mysql:
    ip: 127.0.0.1
    port: 3306
    tables-prefix: pshop_
    database: TheDatabaseName
    username: TheUsername
    password: ThePassword
    max-pool: 10
    ssl: false
integration:
  worldguard: true
  towny:
    shops-only-in-shop-plots: true
other:
  notify-op-of-updates: false
  # When certain items are overlapping/overflowing in the GUI configuration, the plugin will notify ops to take actions.
  notify-op-of-overlapping-gui-items: true
  notify-op-of-overflowing-gui-items: true
protection:
  prevent-shop-destruction: true
notification:
  # Notify users when their shop is empty on join
  notify-empty-shop-on-join: true
  discord:
    # Enable Discord notifications
    enabled: false
    # Discord webhook url
    webhook-url: "https://discord.com/api/webhooks/xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
    # Discord message template
    buy-sell-webhook:
      enabled: true
      template:
        content: null
        embeds: # placeholders: %BUYER%, %SELLER%, %ITEM_NAME%, %PRICE%, %CURRENCY%, %SHOP_LOCATION%, %OWNER%, %COUNT%, %TIME%
          - title: "PebbleShop Transaction"
            description: "**%BUYER%** bought **%COUNT%x %ITEM_NAME%** from **%SELLER%** for **%PRICE%%CURRENCY%**."
            url: "https://pebble.quest"
            color: 5636095
            fields:
              - name: "Shop Location:"
                value: "%SHOP_LOCATION%"
                inline: true
              - name: "Shop Owner:"
                value: "%OWNER%"
                inline: true
              - name: "Buyer:"
                value: "%BUYER%"
                inline: true
              - name: "Seller:"
                value: "%SELLER%"
                inline: true
              - name: "Amount:"
                value: "%COUNT% %ITEM_NAME%"
                inline: true
              - name: "Time:"
                value: "%TIME%"
                inline: true
            author:
              name: "PebbleShop"
              url: "https://pebble.quest"
              icon_url: "https://pebble.quest/favicon.png"
            thumbnail:
              url: "https://pebble.quest/favicon.png"
        attachments: [ ]

    new-shop-webhook:
      enabled: true
      template:
        content: null
        embeds: # placeholders: %OWNER%, %BUYING_PRICE%, %SELLING_PRICE%, %ITEM_NAME%, %MATERIAL%, %TIME%, %SHOP_LOCATION%
          - title: "PebbleShop Created"
            description: "**%OWNER%** created a new shop for **%ITEM_NAME%**."
            url: "https://pebble.quest"
            color: 5636095
            fields:
              - name: "Shop Location:"
                value: "%SHOP_LOCATION%"
                inline: true
              - name: "Buying Price"
                value: "%BUYING_PRICE%"
                inline: true
              - name: "Selling Price:"
                value: "%SELLING_PRICE%"
                inline: true
              - name: "Item Name:"
                value: "%ITEM_NAME%"
                inline: true
              - name: "Material:"
                value: "%MATERIAL%"
                inline: true
              - name: "Time:"
                value: "%TIME%"
                inline: true
            author:
              name: "PebbleShop"
              url: "https://pebble.quest"
              icon_url: "https://pebble.quest/favicon.png"
            thumbnail:
              url: "https://pebble.quest/favicon.png"
        attachments: [ ]
