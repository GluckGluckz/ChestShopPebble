name: Apply Audit Follow-up

on:
  push:
    branches:
      - agent/audit-polish-pr
    paths:
      - scripts/apply_audit_followup.py
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-and-build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out audit PR branch
        uses: actions/checkout@v4
        with:
          ref: agent/audit-polish-pr
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Apply audit follow-up
        run: python3 scripts/apply_audit_followup.py

      - name: Build PebbleShop
        run: mvn --batch-mode --no-transfer-progress clean package

      - name: Commit follow-up fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add core/src/main/java docs
          if git diff --cached --quiet; then
            echo "No source changes to commit"
            exit 0
          fi
          git commit -m "Polish audited shop permissions and transaction rollback"
          git push origin HEAD:agent/audit-polish-pr
