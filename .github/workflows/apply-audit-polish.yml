name: Apply Audit Polish

on:
  push:
    branches:
      - agent/audit-polish-run
    paths:
      - scripts/apply_audit_polish.py
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-and-build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out audit branch
        uses: actions/checkout@v4
        with:
          ref: agent/audit-polish-run
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Apply audited fixes
        run: python3 scripts/apply_audit_polish.py

      - name: Build PebbleShop
        run: mvn --batch-mode --no-transfer-progress clean package

      - name: Commit audited source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add core/src/main/java docs
          if git diff --cached --quiet; then
            echo "No source changes to commit"
            exit 0
          fi
          git commit -m "Audit and harden multi-item shop system"
          git push origin HEAD:agent/audit-polish-run
