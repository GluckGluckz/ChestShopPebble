name: Pull Request Build

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build PebbleShop
        run: mvn --batch-mode --no-transfer-progress clean package

      - name: Upload plugin jars
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PebbleShop-PR-${{ github.event.pull_request.number || github.run_number }}
          path: |
            core/target/*.jar
            dist/target/*.jar
          if-no-files-found: error
