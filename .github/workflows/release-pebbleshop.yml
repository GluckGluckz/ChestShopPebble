name: Release PebbleShop

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: Version segment to advance after this release
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major
      prerelease:
        description: Mark the GitHub Release as a prerelease
        type: boolean
        required: true
        default: false

permissions:
  contents: write

concurrency:
  group: pebbleshop-release
  cancel-in-progress: false

jobs:
  release:
    name: Build, tag, and publish release
    runs-on: ubuntu-latest
    if: >-
      github.ref == 'refs/heads/main' &&
      (
        github.event_name == 'workflow_dispatch' ||
        (
          !startsWith(github.event.head_commit.message, 'Release PebbleShop') &&
          !startsWith(github.event.head_commit.message, 'Bump PebbleShop')
        )
      )

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Calculate release versions
        id: versions
        shell: python
        run: |
          import os
          import subprocess
          import xml.etree.ElementTree as ET

          bump = os.environ["BUMP"]
          ns = {"m": "http://maven.apache.org/POM/4.0.0"}
          tree = ET.parse("pom.xml")
          root = tree.getroot()
          version_el = root.find("m:version", ns)
          if version_el is None or not version_el.text:
              raise SystemExit("Root pom.xml does not contain a project version")

          current = version_el.text.strip()

          def parse_version(value):
              clean = value[:-9] if value.endswith("-SNAPSHOT") else value
              parts = clean.split(".")
              if len(parts) != 3 or not all(part.isdigit() for part in parts):
                  raise SystemExit(f"Expected semantic version MAJOR.MINOR.PATCH, got: {value}")
              return [int(part) for part in parts], value.endswith("-SNAPSHOT")

          def bump_version(parts, segment):
              major, minor, patch = parts
              if segment == "major":
                  return [major + 1, 0, 0]
              if segment == "minor":
                  return [major, minor + 1, 0]
              if segment == "patch":
                  return [major, minor, patch + 1]
              raise SystemExit(f"Unsupported bump segment: {segment}")

          base_parts, is_snapshot = parse_version(current)
          release_parts = base_parts if is_snapshot else bump_version(base_parts, bump)
          next_parts = bump_version(release_parts, bump)

          release_version = ".".join(str(part) for part in release_parts)
          next_snapshot = ".".join(str(part) for part in next_parts) + "-SNAPSHOT"
          tag = f"v{release_version}"

          subprocess.run(["git", "fetch", "--tags", "--force"], check=True)
          tag_exists = subprocess.run(
              ["git", "rev-parse", "--verify", "--quiet", tag],
              stdout=subprocess.DEVNULL,
              stderr=subprocess.DEVNULL,
          ).returncode == 0
          if tag_exists:
              raise SystemExit(f"Release tag already exists: {tag}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"current={current}\n")
              out.write(f"release_version={release_version}\n")
              out.write(f"next_snapshot={next_snapshot}\n")
              out.write(f"tag={tag}\n")
        env:
          BUMP: ${{ github.event_name == 'workflow_dispatch' && inputs.bump || 'patch' }}

      - name: Set Maven release version
        run: |
          mvn -B -ntp org.codehaus.mojo:versions-maven-plugin:2.16.2:set \
            -DnewVersion="${{ steps.versions.outputs.release_version }}" \
            -DgenerateBackupPoms=false

      - name: Build release jar for Paper 26.1.2
        run: mvn -B -ntp clean package

      - name: Commit and tag release version
        run: |
          find . -name pom.xml -print0 | xargs -0 git add
          git commit -m "Release PebbleShop ${{ steps.versions.outputs.tag }}"
          git tag -a "${{ steps.versions.outputs.tag }}" -m "PebbleShop ${{ steps.versions.outputs.tag }}"
          git push origin HEAD:main
          git push origin "${{ steps.versions.outputs.tag }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || 'false' }}
        run: |
          FLAGS=""
          if [ "$PRERELEASE" = "true" ]; then
            FLAGS="--prerelease"
          fi

          gh release create "${{ steps.versions.outputs.tag }}" \
            "target/PebbleShop-${{ steps.versions.outputs.release_version }}.jar" \
            --title "PebbleShop ${{ steps.versions.outputs.tag }}" \
            --notes "PebbleShop ${{ steps.versions.outputs.tag }} release build for Pebble Quest Paper 26.1.2. Built from main and uploaded automatically by GitHub Actions." \
            $FLAGS

      - name: Bump to next snapshot
        run: |
          mvn -B -ntp org.codehaus.mojo:versions-maven-plugin:2.16.2:set \
            -DnewVersion="${{ steps.versions.outputs.next_snapshot }}" \
            -DgenerateBackupPoms=false
          find . -name pom.xml -print0 | xargs -0 git add
          git commit -m "Bump PebbleShop to ${{ steps.versions.outputs.next_snapshot }}"
          git push origin HEAD:main
