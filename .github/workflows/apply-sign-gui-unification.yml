name: Apply Sign GUI Unification

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-build-and-push:
    if: github.head_ref == 'fix/unify-sign-chest-gui' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          fetch-depth: 0
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Unify sign and chest GUI routing
        run: python3 scripts/unify_sign_chest_gui.py
      - name: Build PebbleShop
        run: mvn --batch-mode --no-transfer-progress clean package
      - name: Commit and push fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add core/src/main/java/me/deadlight/ezchestshop/listeners/SignShopListener.java
          git commit -m "Route shop signs through the multi-item GUI"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
