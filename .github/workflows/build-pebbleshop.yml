name: Build PebbleShop

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - pebble-rebrand
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Maven build
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download Spigot BuildTools
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/buildtools"
          cd "$RUNNER_TEMP/buildtools"
          curl -L -o BuildTools.jar "https://hub.spigotmc.org/jenkins/job/BuildTools/lastSuccessfulBuild/artifact/target/BuildTools.jar"

      - name: Set up Java 8 for Spigot 1.16.5
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Install Spigot 1.16.5 remapped dependencies
        shell: bash
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/buildtools"
          java -jar BuildTools.jar --rev 1.16.5 --remapped --disable-java-check

      - name: Set up Java 16 for Spigot 1.17.1
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '16'

      - name: Install Spigot 1.17.1 remapped dependencies
        shell: bash
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/buildtools"
          java -jar BuildTools.jar --rev 1.17.1 --remapped --disable-java-check

      - name: Set up Java 17 for modern build
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Install Spigot 1.18.2-1.20.4 remapped dependencies
        shell: bash
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/buildtools"
          for version in 1.18.2 1.19.4 1.20.4; do
            echo "::group::BuildTools ${version}"
            java -jar BuildTools.jar --rev "${version}" --remapped --disable-java-check
            echo "::endgroup::"
          done

      - name: Build PebbleShop
        run: mvn -B -ntp clean package

      - name: Show build output
        if: always()
        run: |
          echo "Generated files:"
          find target -maxdepth 2 -type f -print || true

      - name: Upload PebbleShop jar
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PebbleShop
          path: |
            target/PebbleShop-*.jar
            !target/original-*.jar
          if-no-files-found: error
