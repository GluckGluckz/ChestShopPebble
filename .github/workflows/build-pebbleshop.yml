name: Build PebbleShop

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - pebble-rebrand
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Maven build
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build PebbleShop
        run: mvn -B -ntp clean package

      - name: Show build output
        if: always()
        run: |
          echo "Generated files:"
          find target -maxdepth 2 -type f -print || true

      - name: Upload PebbleShop jar
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PebbleShop
          path: |
            target/PebbleShop-*.jar
            !target/original-*.jar
          if-no-files-found: error
