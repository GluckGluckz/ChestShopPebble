name: Apply Audit Follow-up PR

on:
  pull_request:
    branches:
      - agent/multi-item-chest-shops

permissions:
  contents: write

jobs:
  apply-build-and-push:
    if: github.head_ref == 'agent/audit-polish-pr' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          fetch-depth: 0
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Apply audit follow-up
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('scripts/apply_audit_followup.py')
          s = p.read_text(encoding='utf-8')
          s = s.replace('for key in ("dbuy", "dsell", "msgtoggle", "shareincome"):',
                        'for key in ("dbuy", "dsell", "msgtoggle"):')
          needle = '''        gui.setItem(2, 8, new GuiItem(toggleItem(
                  shareIncome ? Material.LIME_DYE : Material.GRAY_DYE,
                  shareIncome ? "&a&lShared Income On" : "&7&lShared Income Off",
                  "&7Splits eligible income with shop staff.", "&eTap to toggle."), event -> {
              event.setCancelled(true);
              if (adminShop) {'''
          replacement = '''        gui.setItem(2, 8, new GuiItem(toggleItem(
                  shareIncome ? Material.LIME_DYE : Material.GRAY_DYE,
                  shareIncome ? "&a&lShared Income On" : "&7&lShared Income Off",
                  "&7Splits eligible income with shop staff.", "&eTap to toggle."), event -> {
              event.setCancelled(true);
              if (!requireSettingsAccess(player, containerBlock)) {
                  return;
              }
              if (adminShop) {'''
          insertion = '''text = once(text,
              "        gui.setItem(2, 8, new GuiItem(toggleItem(\\n"
              "                shareIncome ? Material.LIME_DYE : Material.GRAY_DYE,\\n"
              "                shareIncome ? \\\"&a&lShared Income On\\\" : \\\"&7&lShared Income Off\\\",\\n"
              "                \\\"&7Splits eligible income with shop staff.\\\", \\\"&eTap to toggle.\\\"), event -> {\\n"
              "            event.setCancelled(true);\\n"
              "            if (adminShop) {",
              "        gui.setItem(2, 8, new GuiItem(toggleItem(\\n"
              "                shareIncome ? Material.LIME_DYE : Material.GRAY_DYE,\\n"
              "                shareIncome ? \\\"&a&lShared Income On\\\" : \\\"&7&lShared Income Off\\\",\\n"
              "                \\\"&7Splits eligible income with shop staff.\\\", \\\"&eTap to toggle.\\\"), event -> {\\n"
              "            event.setCancelled(true);\\n"
              "            if (!requireSettingsAccess(player, containerBlock)) {\\n"
              "                return;\\n"
              "            }\\n"
              "            if (adminShop) {",
              "settings permission recheck shareincome")
          '''
          marker = 'text = once(text,\n    "        gui.setItem(6, 7, new GuiItem(add, event -> {\\n"'
          if insertion not in s:
              if marker not in s:
                  raise SystemExit('Could not locate follow-up insertion marker')
              s = s.replace(marker, insertion + marker, 1)
          p.write_text(s, encoding='utf-8')
          PY
          set +e
          python3 scripts/apply_audit_followup.py > /tmp/audit-followup.log 2>&1
          status=$?
          cat /tmp/audit-followup.log
          if [ "$status" -ne 0 ]; then
            exit "$status"
          fi
      - name: Upload audit diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: audit-followup-error
          path: /tmp/audit-followup.log
          if-no-files-found: error
      - name: Build PebbleShop
        run: mvn --batch-mode --no-transfer-progress clean package
      - name: Commit and push generated fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add core/src/main/java docs
          git commit -m "Polish audited shop permissions and transaction rollback"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
